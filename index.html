<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P&L продаж — дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">P&L</div>
  <div><div class="bname">P&amp;L продаж</div><div class="bsub">Wildberries</div></div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-p="pl" onclick="tab('pl')">P&amp;L</button>
    <button class="tab" data-p="profit" onclick="tab('profit')">Прибыль</button>
    <button class="tab" data-p="adv" onclick="tab('adv')">Реклама</button>
    <button class="tab" data-p="log" onclick="tab('log')">Логистика</button>
    <button class="tab" data-p="fix" onclick="tab('fix')">Пост.Р</button>
    <button class="tab" data-p="check" onclick="tab('check')">Чек</button>
    <button class="tab" data-p="razbor" onclick="tab('razbor')">Разбор</button>
    <button class="tab" data-p="komwb" onclick="tab('komwb')">Комиссия ВБ</button>
    <button class="tab" data-p="insights" onclick="tab('insights')">Инсайты</button>
  </div>
  <div class="hright">
    <div class="clock" id="clk"></div>
    <button class="b" onclick="toggleDiag()">◧ диагностика</button>
    <button class="b pri" id="reloadBtn" onclick="reload()">↻ обновить</button>
  </div>
</div>

<div class="main">
  <!-- FILTER BAR -->
  <div class="fbar" id="fbar" style="display:none">
    <div class="fitem"><label>Компания</label><select class="sel" id="fCo" onchange="switchCo(this.value)">
      <option value="EF">EF</option><option value="EZFR">EZFR</option><option value="OZON">OZON</option><option value="CONS">Консолид</option>
    </select></div>
    <div class="fitem"><label>Год</label><select class="sel" id="fYear" onchange="render()"></select></div>
    <div class="fitem"><label>Месяц</label><select class="sel" id="fMonth" onchange="render()"><option value="">Все</option></select></div>
    <div class="fitem"><label>Артикул</label><input class="search" id="fSearch" list="artList" placeholder="поиск…" oninput="debouncedRender()"><datalist id="artList"></datalist></div>
    <div class="fitem" id="grpWrap"><label>Срез</label><div class="ctog" id="grp">
      <button class="on" data-g="month" onclick="setGrp('month')">Месяц</button>
      <button data-g="predmet" onclick="setGrp('predmet')">Предмет</button>
      <button data-g="artikul" onclick="setGrp('artikul')">Артикул</button>
    </div></div>
    <div class="fitem" id="pyWrap"><button class="b" id="pyBtn" onclick="togglePY()">＋ прошлый год</button></div>
    <div class="fspacer" id="fInfo"></div>
  </div>

  <!-- PL PAGE -->
  <div id="page-pl">
    <div id="kpi" class="mg" style="display:none"></div>
    <div class="sec" id="matrixSec" style="display:none">
      <div class="sh"><div class="st" id="matrixTtl">P&amp;L по месяцам</div><div class="sm2" id="matrixSub"></div></div>
      <div class="sw"><table id="matrix"></table></div>
      <div class="diag" id="diag"></div>
    </div>
  </div>

  <!-- other pages -->
  <div id="page-profit" style="display:none"></div>
  <div id="page-adv" style="display:none"></div>
  <div id="page-log" style="display:none"></div>
  <div id="page-fix" style="display:none"></div>
  <div id="page-check" style="display:none"></div>
  <div id="page-razbor" style="display:none"></div>
  <div id="page-komwb" style="display:none"></div>
  <div id="page-insights" style="display:none"></div>

  <div id="placeholder" class="lm">Загрузка данных…</div>
</div>

<!-- JS: порядок важен — каждый файл зависит от предыдущих -->
<script src="config.js"></script>
<script src="parsers.js"></script>
<script src="model.js"></script>
<script src="measures.js"></script>
<script src="render.js"></script>
<script src="tabs.js"></script>
<script src="razbor.js"></script>
<script src="insights.js"></script>
<script src="ui.js"></script>
</body>
</html>
