name: Build model.json

on:
  workflow_dispatch:          # кнопка «Run workflow»
  schedule:
    - cron: '0 5 * * 1'       # каждый понедельник, 05:00 UTC

permissions:
  contents: write

concurrency:
  group: build-model
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # страховка: зависший шаг убивается, а не висит 6 часов
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # кэш распакованных xlsx → csv (ключ по содержимому папки не годится:
      # файлы на Drive, а не в репо → используем restore-keys и всегда дописываем)
      - uses: actions/cache@v4
        with:
          path: cache
          key: wbfin-csv-${{ github.run_id }}
          restore-keys: wbfin-csv-

      - name: Install deps
        run: npm install --no-save xlsx googleapis

      - name: Build
        env:
          GDRIVE_SA_JSON:   ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          SHEET_CSV_URLS:   ${{ secrets.SHEET_CSV_URLS }}
          WBFIN_EF:         ${{ vars.WBFIN_EF }}         # поставить "1" на приоритете 3
          NODE_OPTIONS: --max-old-space-size=6144
        run: node prebuild.mjs

      - name: Commit
        env:
          GIT_TERMINAL_PROMPT: 0          # никогда не ждать ввода
          GIT_EDITOR: 'true'              # никаких редакторов при merge/rebase
        run: |
          git config user.name  "pl-bot"
          git config user.email "pl-bot@users.noreply.github.com"

          # model.json нельзя мержить — наш всегда новее.
          # Поэтому: отложить файл → взять свежий main → положить файл обратно.
          cp data/model.json /tmp/model.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p data
          cp /tmp/model.json data/model.json

          git add data/model.json
          if git diff --staged --quiet; then
            echo "Изменений нет"
            exit 0
          fi
          git commit -m "data: пересборка model.json [skip ci]"
          git push origin HEAD:main
